<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>markitdown</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#fff;color:#111;min-height:100vh}
  @media(prefers-color-scheme:dark){
    body{background:#111;color:#eee}
    .drop{border-color:#444}
    .drop:hover,.drop.over{background:#1a1a1a}
    textarea{background:#1a1a1a;color:#eee;border-color:#333}
    button{color:#eee;border-color:#444}
    button:hover{background:#222}
    .note{border-color:#333;color:#777}
  }
  .wrap{max-width:640px;margin:0 auto;padding:3rem 1.5rem}
  h1{font-size:22px;font-weight:500;margin-bottom:.25rem}
  .sub{font-size:14px;color:#666;margin-bottom:2rem}
  .drop{border:1.5px dashed #bbb;border-radius:12px;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:background .15s}
  .drop:hover,.drop.over{background:#f7f7f7}
  .drop i{font-size:32px;color:#999;display:block;margin-bottom:.75rem}
  .drop p{font-size:14px;color:#666}
  .drop strong{color:#111}
  @media(prefers-color-scheme:dark){.drop strong{color:#eee}}
  input[type=file]{display:none}
  .status{margin-top:1.25rem;font-size:13px;color:#666;min-height:20px}
  .status.err{color:#c00}
  .out{margin-top:1.5rem;display:none}
  .out-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
  .out-label{font-size:11px;font-weight:500;color:#999;letter-spacing:.06em;text-transform:uppercase}
  button{font-size:13px;background:none;border:.5px solid #ccc;border-radius:8px;padding:5px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .1s}
  button:hover{background:#f5f5f5}
  textarea{width:100%;height:420px;font-family:monospace;font-size:13px;border:.5px solid #ddd;border-radius:8px;padding:.75rem;resize:vertical;line-height:1.6;background:#fafafa;color:#111}
  @media(prefers-color-scheme:dark){textarea{background:#1a1a1a;color:#eee}}
  .dl-btn{margin-top:.75rem;width:100%;padding:10px;justify-content:center;font-size:14px}
  .note{margin-top:2rem;padding:.75rem 1rem;border-left:2px solid #e0e0e0;font-size:13px;color:#888;line-height:1.6}
  .spinner{display:inline-block;width:11px;height:11px;border:1.5px solid #ccc;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>markitdown</h1>
  <p class="sub">upload a file, get markdown back — pdf, docx, pptx, xlsx, html, csv and more</p>

  <div class="drop" id="drop">
    <i class="ti ti-file-upload"></i>
    <p><strong>drop a file here</strong></p>
    <p style="margin-top:6px">or click to browse</p>
    <input type="file" id="filein">
  </div>

  <div class="status" id="status"></div>

  <div class="out" id="out">
    <div class="out-header">
      <span class="out-label">markdown output</span>
      <button id="copybtn"><i class="ti ti-copy"></i> copy</button>
    </div>
    <textarea id="result" readonly></textarea>
    <button class="dl-btn" id="dlbtn"><i class="ti ti-download"></i> download .md</button>
  </div>

  <div class="note">
    files are sent to a private backend for conversion and immediately deleted. nothing is stored.
  </div>
</div>

<script>
const BACKEND = 'https://lightweightconversion-production.up.railway.app';

const drop   = document.getElementById('drop');
const filein = document.getElementById('filein');
const status = document.getElementById('status');
const out    = document.getElementById('out');
const result = document.getElementById('result');
const copybtn= document.getElementById('copybtn');
const dlbtn  = document.getElementById('dlbtn');
let filename = 'output.md';

function setStatus(html, isErr) {
  status.innerHTML = html;
  status.className = 'status' + (isErr ? ' err' : '');
}

drop.addEventListener('click', () => filein.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', () => drop.classList.remove('over'));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); if(e.dataTransfer.files[0]) go(e.dataTransfer.files[0]); });
filein.addEventListener('change', () => { if(filein.files[0]) go(filein.files[0]); });

async function go(file) {
  filename = file.name.replace(/\.[^.]+$/, '') + '.md';
  out.style.display = 'none';
  setStatus('<span class="spinner"></span> converting ' + file.name + '...');
  try {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch(BACKEND + '/convert', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json().catch(() => ({detail: 'server error ' + res.status}));
      throw new Error(err.detail || 'server error');
    }
    const data = await res.json();
    result.value = data.markdown || '(no content extracted)';
    out.style.display = 'block';
    setStatus('✓ done');
  } catch(e) {
    setStatus('error: ' + (e.message || String(e)), true);
  }
}

copybtn.addEventListener('click', () => {
  navigator.clipboard.writeText(result.value).then(() => {
    copybtn.innerHTML = '<i class="ti ti-check"></i> copied';
    setTimeout(() => { copybtn.innerHTML = '<i class="ti ti-copy"></i> copy'; }, 1500);
  });
});

dlbtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([result.value], {type:'text/markdown'}));
  a.download = filename;
  a.click();
});
</script>
</body>
</html>
